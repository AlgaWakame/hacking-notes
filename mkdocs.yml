site_name: OSAI Notes
site_description: Notas públicas de preparación para OSAI / AI-300 y AI Red Teaming
site_author: Ismael de Frutos
site_url: https://algawakame.github.io/osai-notes/

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Metodología:
      - Flujo AI Red Team: metodologia/flujo-ai-red-team.md
      - Enumeración: metodologia/enumeracion.md
      - Arquitectura IA: metodologia/arquitectura.md
      - Trust Boundaries: metodologia/trust-boundaries.md
      - Evidencias: metodologia/evidencias.md
  - Conceptos:
      - LLM: conceptos/llm.md
      - RAG: conceptos/rag.md
      - Embeddings: conceptos/embeddings.md
      - Agentes: conceptos/agentes.md
      - Tool Calling: conceptos/tool-calling.md
  - Técnicas:
      - Prompt Injection Directa: tecnicas/prompt-injection-directa.md
      - Prompt Injection Indirecta: tecnicas/prompt-injection-indirecta.md
      - RAG Data Extraction: tecnicas/rag-data-extraction.md
      - Tool Abuse: tecnicas/tool-abuse.md
      - SSRF vía Agente: tecnicas/ssrf-via-agent.md
  - Vulnerabilidades:
      - Prompt Injection: vulnerabilidades/prompt-injection.md
      - Sensitive Information Disclosure: vulnerabilidades/sensitive-information-disclosure.md
      - Improper Output Handling: vulnerabilidades/improper-output-handling.md
      - Excessive Agency: vulnerabilidades/excessive-agency.md
  - Payloads:
      - Prompt Injection: payloads/prompt-injection.md
      - RAG: payloads/rag.md
      - Agentes: payloads/agentes.md
  - Herramientas:
      - Burp Suite: herramientas/burp-suite.md
      - Python: herramientas/python.md
      - Docker: herramientas/docker.md
      - curl: herramientas/curl.md
      - jq: herramientas/jq.md
  - Reporting:
      - Plantilla de Vulnerabilidad: reporting/plantilla-vulnerabilidad.md
      - Impacto: reporting/impacto.md
      - Recomendaciones: reporting/recomendaciones.md
  - Examen:
      - Checklist de Preparación: examen/checklist-preparacion.md
      - Checklist de Evidencias: examen/checklist-evidencias.md
      - Control de Tiempo: examen/control-tiempo.md
      - Errores a Evitar: examen/errores-a-evitar.md