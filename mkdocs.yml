site_name: Hacking Notes
site_description: Notas públicas de ciberseguridad ofensiva, AI Red Teaming, pentesting y reporting
site_author: Algawakame
site_url: https://AlgaWakame.github.io/hacking-notes/

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

plugins:
  - search
  - tags
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: es
          name: Español
          build: true
          default: true
          site_name: "Hacking Notes"
          site_description: "Notas públicas de ciberseguridad ofensiva, AI Red Teaming, pentesting, Web/API Security y reporting"

        - locale: en
          name: English
          build: true
          site_name: "Hacking Notes"
          site_description: "Public notes about offensive security, AI Red Teaming, pentesting, Web/API Security and technical reporting"
          nav_translations:
            Inicio: Home
            Metodología: Methodology
            Flujo general: General flow
            Enumeración: Enumeration
            Arquitectura: Architecture
            Trust Boundaries: Trust boundaries
            Evidencias: Evidence
            Conceptos: Concepts
            Técnicas: Techniques
            Vulnerabilidades: Vulnerabilities
            Prompt Injection Directa: Direct Prompt Injection
            Prompt Injection Indirecta: Indirect Prompt Injection
            RAG Data Extraction: RAG Data Extraction
            Tool Abuse: Tool Abuse
            SSRF vía Agente: SSRF via Agent
            Sensitive Information Disclosure: Sensitive Information Disclosure
            Improper Output Handling: Improper Output Handling
            Excessive Agency: Excessive Agency
            Payloads: Payloads
            Agentes: Agents
            Herramientas: Tools
            Burp Suite: Burp Suite
            Python: Python
            Docker: Docker
            curl: curl
            jq: jq
            Reporting: Reporting
            Plantilla de Vulnerabilidad: Vulnerability Template
            Impacto: Impact
            Recomendaciones: Recommendations
            Examen: Exam
            Checklist de Preparación: Preparation Checklist
            Checklist de Evidencias: Evidence Checklist
            Control de Tiempo: Time Management
            Errores a Evitar: Mistakes to Avoid

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md

  - AI Red Teaming:
      - Inicio: ai-red-teaming/index.md
      - Conceptos:
          - LLM: ai-red-teaming/conceptos/llm.md
          - RAG: ai-red-teaming/conceptos/rag.md
          - Embeddings: ai-red-teaming/conceptos/embeddings.md
          - Agentes: ai-red-teaming/conceptos/agentes.md
          - Tool Calling: ai-red-teaming/conceptos/tool-calling.md
      - Técnicas:
          - Prompt Injection Directa: ai-red-teaming/tecnicas/prompt-injection-directa.md
          - Prompt Injection Indirecta: ai-red-teaming/tecnicas/prompt-injection-indirecta.md
          - RAG Data Extraction: ai-red-teaming/tecnicas/rag-data-extraction.md
          - Tool Abuse: ai-red-teaming/tecnicas/tool-abuse.md
          - SSRF vía Agente: ai-red-teaming/tecnicas/ssrf-via-agent.md
      - Vulnerabilidades:
          - Prompt Injection: ai-red-teaming/vulnerabilidades/prompt-injection.md
          - Sensitive Information Disclosure: ai-red-teaming/vulnerabilidades/sensitive-information-disclosure.md
          - Improper Output Handling: ai-red-teaming/vulnerabilidades/improper-output-handling.md
          - Excessive Agency: ai-red-teaming/vulnerabilidades/excessive-agency.md
      - Payloads:
          - Prompt Injection: ai-red-teaming/payloads/prompt-injection.md
          - RAG: ai-red-teaming/payloads/rag.md
          - Agentes: ai-red-teaming/payloads/agentes.md

  - Web & API Security:
        - Inicio: web-api/index.md
        - Metodología: web-api/metodologia.md
        - Enumeración: web-api/enumeracion.md
        - Autenticación: web-api/autenticacion.md
        - Autorización e IDOR: web-api/autorizacion-idor.md
        - API Testing: web-api/api-testing.md
        - Business Logic: web-api/business-logic.md
        - Input Validation: web-api/input-validation.md
        - Rate Limiting: web-api/rate-limiting.md
        - Information Disclosure: web-api/information-disclosure.md

  - Pentesting:
      - Inicio: pentesting/index.md
      - Active Directory:
          - Metodología AD: pentesting/active-directory/index.md
          - NetExec Quick Reference: pentesting/active-directory/netexec.md
          - Enumeración AD: pentesting/active-directory/enumeracion.md
          - Kerberos: pentesting/active-directory/kerberos.md
          - BloodHound: pentesting/active-directory/bloodhound.md
          - AD CS: pentesting/active-directory/adcs.md
          - Certipy Quick Reference: pentesting/active-directory/certipy.md

  - Herramientas:
      - Burp Suite: herramientas/burp-suite.md
      - Python: herramientas/python.md
      - Docker: herramientas/docker.md
      - curl: herramientas/curl.md
      - jq: herramientas/jq.md

  - Reporting:
      - Plantilla de Vulnerabilidad: reporting/plantilla-vulnerabilidad.md
      - Impacto: reporting/impacto.md
      - Recomendaciones: reporting/recomendaciones.md

  - Examen:
      - Checklist de Preparación: examen/checklist-preparacion.md
      - Checklist de Evidencias: examen/checklist-evidencias.md
      - Control de Tiempo: examen/control-tiempo.md
      - Errores a Evitar: examen/errores-a-evitar.md